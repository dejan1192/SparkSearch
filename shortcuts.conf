# Spark Run shortcut commands.
#
# Bare commands open the base URL:
# !g = "https://google.com/"
#
# Optional .search commands are used when text follows the shortcut.
# Use {query} where the URL-encoded search text should go.

!g = "https://google.com/"
!g.search = "https://www.google.com/search?q={query}"

!d = "https://duckduckgo.com/"
!d.search = "https://duckduckgo.com/?q={query}"

!git = "https://github.com/"
!git.search = "https://github.com/search?q={query}"

!y = "https://www.youtube.com/"
!y.search = "https://www.youtube.com/results?search_query={query}"

!gpt = "https://chatgpt.com/"
!gpt.search = "https://chatgpt.com/?q={query}"

!claude = "https://claude.ai/"

!twitch = "https://www.twitch.tv/"
!twitch.search = "https://www.twitch.tv/search?term={query}"

!kp = "https://kupujemprodajem.com/"
!kp.search = "https://www.kupujemprodajem.com/pretraga?keywords={query}"

!bm = "https://forum.benchmark.rs/"
!bm.search = "https://forum.benchmark.rs/search/2693376/?q={query}&o=date"

!py = "https://docs.python.org/"
!py.search = "https://docs.python.org/3/search.html?q={query}"

!wiki = "https://en.wikipedia.org/"
!wiki.search = "https://en.wikipedia.org/wiki/{query}"